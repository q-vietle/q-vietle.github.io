# Site settings
locale: en-US
title: "<FULL_NAME>"
title_separator: "|"
name: "<FULL_NAME>"
description: "Academic website of <FULL_NAME>, <TITLE> at <UNIVERSITY / DEPARTMENT>."
url: "https://q-vietle.github.io"
baseurl: ""
repository: "q-vietle/q-vietle.github.io"
email: "your.email@university.edu"

# Theme
remote_theme: "mmistakes/minimal-mistakes@4.27.1"
minimal_mistakes_skin: "default"
search: true

# Author profile
author:
  name: "<FULL_NAME>"
  avatar: "/img/avatar-placeholder.svg"
  bio: "<TITLE> at <UNIVERSITY / DEPARTMENT>"
  location: "<UNIVERSITY / DEPARTMENT>"
  email: "your.email@university.edu"
  links:
    - label: "Google Scholar"
      icon: "fas fa-graduation-cap"
      url: "https://scholar.google.com/"
    - label: "ORCID"
      icon: "fab fa-orcid"
      url: "https://orcid.org/"
    - label: "GitHub"
      icon: "fab fa-github"
      url: "https://github.com/q-vietle"
    - label: "Email"
      icon: "fas fa-envelope"
      url: "mailto:your.email@university.edu"

footer:
  links:
    - label: "Email"
      icon: "fas fa-envelope"
      url: "mailto:your.email@university.edu"
    - label: "GitHub"
      icon: "fab fa-github"
      url: "https://github.com/q-vietle"
    - label: "ORCID"
      icon: "fab fa-orcid"
      url: "https://orcid.org/"

# Output and URLs
permalink: /:categories/:title/

include:
  - _pages

# Markdown / Sass
markdown: kramdown
highlighter: rouge
kramdown:
  input: GFM
sass:
  style: compressed

# Plugins supported by GitHub Pages and used by Minimal Mistakes
plugins:
  - jekyll-remote-theme
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-seo-tag
  - jekyll-include-cache

# SEO / social preview
social:
  type: Person
  name: "<FULL_NAME>"
  links:
    - "https://scholar.google.com/"
    - "https://orcid.org/"
    - "https://github.com/q-vietle"
og_image: "/img/avatar-placeholder.svg"

defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: single
      author_profile: true
      read_time: false
      comments: false
      share: false
      related: false
      image: "/img/avatar-placeholder.svg"
  - scope:
      path: ""
      type: pages
    values:
      layout: single
      author_profile: true
      image: "/img/avatar-placeholder.svg"
